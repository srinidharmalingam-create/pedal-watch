name: Auto-refresh pedal videos

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: auto-refresh-pedal-videos
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install yt-dlp
        run: python -m pip install --user yt-dlp

      - name: Refresh pedal video data
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          node scripts/refresh-content.mjs

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/auto-refresh.json
          if git diff --cached --quiet; then
            echo "No refresh changes to commit."
          else
            git commit -m "Auto-refresh pedal video data"
            git push
          fi
